name: Deploy backend

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repo files
        run: |
          pwd
          ls -la
          cat package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check Node
        run: |
          node -v
          npm -v

      - name: Install deps
        run: npm ci

      - name: Prepare release dir
        run: |
          RELEASE_DIR=/srv/myapp/backend/releases/${GITHUB_SHA}
          mkdir -p "$RELEASE_DIR"

      - name: Copy app files
        run: |
          RELEASE_DIR=/srv/myapp/backend/releases/${GITHUB_SHA}
          rsync -a ./ "$RELEASE_DIR"/ \
            --exclude .git \
            --exclude .github \
            --exclude node_modules

      - name: Install production deps in release
        run: |
          RELEASE_DIR=/srv/myapp/backend/releases/${GITHUB_SHA}
          cd "$RELEASE_DIR"
          npm ci --omit=dev

      - name: Copy env
        run: |
          RELEASE_DIR=/srv/myapp/backend/releases/${GITHUB_SHA}
          cp /srv/myapp/shared/backend/.env "$RELEASE_DIR"/.env

      - name: Publish current
        run: |
          RELEASE_DIR=/srv/myapp/backend/releases/${GITHUB_SHA}
          rsync -a --delete "$RELEASE_DIR"/ /srv/myapp/backend/current/

      - name: Restart backend service
        run: sudo systemctl restart gpx-overfly-be

      - name: Check backend service
        run: sudo systemctl status gpx-overfly-be